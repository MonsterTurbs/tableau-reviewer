<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1890 900" role="img" aria-labelledby="title desc">
  <title id="title">Annotated Tableau worksheet interface</title>
  <desc id="desc">A Tableau worksheet interface diagram with numbered callouts pointing to the menu bar, toolbar, data pane, shelves, marks card, canvas, Show Me, publish button, and sheet tabs.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2563eb"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <style>
      .uiText{font-family:Arial,Helvetica,sans-serif;fill:#17212b}
      .tiny{font-size:13px}
      .small{font-size:16px}
      .label{font-size:18px;font-weight:700}
      .callout{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:800;fill:#fff}
      .calloutText{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:800;fill:#0f172a}
      .arrow{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .ring{fill:#2563eb;stroke:#fff;stroke-width:4}
      .highlight{fill:none;stroke:#2563eb;stroke-width:4;stroke-dasharray:9 7}
    </style>
  </defs>
  <rect width="1890" height="900" fill="#f3f6f8"/>
  <rect x="0" y="1" width="1890" height="60" fill="#202538"/>
  <g class="uiText" fill="#fff">
    <text x="5" y="44" font-size="14" fill="#fff">File</text>
    <text x="46" y="44" font-size="14" fill="#fff">Data</text>
    <text x="93" y="44" font-size="14" fill="#fff">Worksheet</text>
    <text x="177" y="44" font-size="14" fill="#fff">Dashboard</text>
    <text x="262" y="44" font-size="14" fill="#fff">Analysis</text>
    <text x="333" y="44" font-size="14" fill="#fff">Map</text>
    <text x="377" y="44" font-size="14" fill="#fff">Format</text>
    <text x="439" y="44" font-size="14" fill="#fff">Help</text>
    <rect x="885" y="22" width="46" height="16" rx="3" fill="none" stroke="#fff"/>
    <text x="894" y="36" font-size="13" fill="#fff">Draft</text>
    <text x="940" y="36" font-size="16" font-weight="700" fill="#fff">New Workbook</text>
    <text x="1454" y="34" font-size="13" fill="#fff">All changes saved</text>
    <rect x="1573" y="19" width="146" height="23" rx="2" fill="#0f729b"/>
    <text x="1598" y="35" font-size="13" font-weight="700" fill="#fff">Publish As...</text>
    <text x="1778" y="35" font-size="13" fill="#fff">Reymond Turbanada</text>
  </g>
  <rect x="0" y="61" width="1890" height="39" fill="#f4f4f4" stroke="#d5dbe1"/>
  <g stroke="#9ca3af" stroke-width="2" fill="none">
    <path d="M6 80 H18 M6 80 L13 73 M6 80 L13 87"/>
    <path d="M40 80 H52 M52 80 L45 73 M52 80 L45 87" opacity=".45"/>
    <rect x="135" y="74" width="11" height="15" rx="2"/>
    <path d="M177 73 v18 M169 83 h16"/>
    <rect x="212" y="74" width="17" height="17"/>
    <rect x="250" y="72" width="17" height="17"/>
    <path d="M436 72 l8 8 l-8 8 M437 88 h14"/>
    <rect x="482" y="70" width="44" height="26"/>
    <path d="M612 73 h19 v17 h-19z"/>
    <path d="M665 73 h15 v15 h-15z M696 73 h18 v15 h-18z"/>
  </g>
  <rect x="0" y="100" width="195" height="767" fill="#fff" stroke="#d5dbe1"/>
  <rect x="0" y="100" width="74" height="28" fill="#fff" stroke="#d5dbe1"/>
  <rect x="74" y="100" width="121" height="28" fill="#f7f7f7" stroke="#d5dbe1"/>
  <text x="7" y="119" class="uiText small" font-weight="700">Data</text>
  <text x="88" y="119" class="uiText small" font-weight="700">Analytics</text>
  <text x="7" y="147" class="uiText tiny">dev-datawarehouse</text>
  <rect x="2" y="174" width="129" height="23" fill="#fff" stroke="#17212b"/>
  <text x="28" y="189" class="uiText tiny">Search</text>
  <text x="13" y="221" class="uiText small" font-weight="700">Tables</text>
  <line x1="13" y1="241" x2="187" y2="241" stroke="#d5dbe1"/>
  <rect x="195" y="100" width="190" height="767" fill="#f5f5f5" stroke="#d5dbe1"/>
  <rect x="201" y="101" width="177" height="44" fill="#fbfbfb" stroke="#d5dbe1"/>
  <text x="224" y="118" class="uiText small">Pages</text>
  <rect x="201" y="152" width="177" height="45" fill="#fbfbfb" stroke="#d5dbe1"/>
  <text x="224" y="170" class="uiText small">Filters</text>
  <rect x="201" y="203" width="177" height="191" fill="#fff" stroke="#d5dbe1"/>
  <text x="224" y="222" class="uiText small">Marks</text>
  <rect x="209" y="235" width="162" height="23" fill="#f9fafb" stroke="#17212b"/>
  <text x="236" y="251" class="uiText tiny">Automatic</text>
  <g class="uiText tiny" text-anchor="middle">
    <rect x="208" y="264" width="50" height="50" fill="#fff" stroke="#d5dbe1"/>
    <text x="233" y="305">Color</text>
    <rect x="265" y="264" width="50" height="50" fill="#fff" stroke="#d5dbe1"/>
    <text x="290" y="305">Size</text>
    <rect x="322" y="264" width="50" height="50" fill="#fff" stroke="#d5dbe1"/>
    <text x="347" y="305">Text</text>
    <rect x="208" y="321" width="50" height="50" fill="#fff" stroke="#d5dbe1"/>
    <text x="233" y="361">Detail</text>
    <rect x="265" y="321" width="50" height="50" fill="#fff" stroke="#d5dbe1"/>
    <text x="290" y="361">Tooltip</text>
  </g>
  <rect x="385" y="100" width="1505" height="34" fill="#fbfbfb" stroke="#d5dbe1"/>
  <rect x="385" y="135" width="1505" height="34" fill="#fbfbfb" stroke="#d5dbe1"/>
  <text x="393" y="119" class="uiText small">Columns</text>
  <text x="393" y="154" class="uiText small">Rows</text>
  <rect x="385" y="169" width="1505" height="691" fill="#fff" stroke="#d5dbe1"/>
  <text x="393" y="201" class="uiText" font-size="22">Sheet 1</text>
  <path d="M1004 548 C1035 459 1139 452 1206 506" stroke="#5aa8ff" stroke-width="2.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow)"/>
  <rect x="1128" y="516" width="158" height="28" rx="14" fill="#dcecff" stroke="#5aa8ff" stroke-width="2"/>
  <text x="1083" y="576" class="uiText tiny">Add data to visualize</text>
  <text x="1012" y="598" class="uiText tiny">Double-click or drag fields from the data pane.</text>
  <rect x="0" y="867" width="1890" height="32" fill="#eeeeee" stroke="#d5dbe1"/>
  <rect x="0" y="868" width="120" height="30" fill="#eeeeee" stroke="#d5dbe1"/>
  <text x="20" y="887" class="uiText tiny">Data Source</text>
  <rect x="120" y="868" width="56" height="30" fill="#fff" stroke="#d5dbe1"/>
  <text x="128" y="887" class="uiText tiny" font-weight="700">Sheet 1</text>
  <text x="1760" y="84" class="uiText tiny">Show Me</text>
  <g filter="url(#softShadow)">
    <rect x="585" y="690" width="620" height="72" rx="8" fill="#fff" stroke="#d8e1e8"/>
    <text x="608" y="719" class="uiText label">Annotated Worksheet Tour</text>
    <text x="608" y="745" class="uiText small">Use the modal Next button to study each numbered interface area.</text>
  </g>
  <g>
    <path class="arrow" d="M82 22 C160 10 230 14 302 28"/>
    <circle class="ring" cx="68" cy="20" r="18"/><text x="68" y="26" text-anchor="middle" class="callout">1</text>
    <text x="92" y="24" class="calloutText">Menu Bar</text>
    <path class="arrow" d="M335 73 C410 62 505 64 588 80"/>
    <circle class="ring" cx="322" cy="70" r="18"/><text x="322" y="76" text-anchor="middle" class="callout">2</text>
    <text x="344" y="66" class="calloutText">Toolbar</text>
    <path class="arrow" d="M1115 28 C1060 22 1008 24 948 31"/>
    <circle class="ring" cx="1136" cy="28" r="18"/><text x="1136" y="34" text-anchor="middle" class="callout">3</text>
    <text x="1160" y="32" class="calloutText">Workbook title</text>
    <path class="arrow" d="M1695 54 C1678 47 1658 43 1630 36"/>
    <circle class="ring" cx="1728" cy="56" r="18"/><text x="1728" y="62" text-anchor="middle" class="callout">4</text>
    <text x="1752" y="61" class="calloutText">Publish</text>
    <path class="arrow" d="M105 284 C63 248 52 212 66 183"/>
    <circle class="ring" cx="115" cy="294" r="18"/><text x="115" y="300" text-anchor="middle" class="callout">5</text>
    <text x="139" y="300" class="calloutText">Data pane</text>
    <path class="arrow" d="M258 448 C242 403 237 358 236 326"/>
    <circle class="ring" cx="262" cy="470" r="18"/><text x="262" y="476" text-anchor="middle" class="callout">6</text>
    <text x="286" y="475" class="calloutText">Marks card</text>
    <path class="arrow" d="M232 88 C244 101 252 112 262 126"/>
    <circle class="ring" cx="214" cy="77" r="18"/><text x="214" y="83" text-anchor="middle" class="callout">7</text>
    <text x="238" y="82" class="calloutText">Pages shelf</text>
    <path class="arrow" d="M205 170 C213 169 218 169 224 169"/>
    <circle class="ring" cx="177" cy="172" r="18"/><text x="177" y="178" text-anchor="middle" class="callout">8</text>
    <text x="13" y="174" class="calloutText">Filters shelf</text>
    <path class="arrow" d="M548 79 C532 92 520 103 504 113"/>
    <circle class="ring" cx="563" cy="66" r="18"/><text x="563" y="72" text-anchor="middle" class="callout">9</text>
    <text x="587" y="71" class="calloutText">Columns</text>
    <path class="arrow" d="M545 178 C529 166 516 155 499 150"/>
    <circle class="ring" cx="561" cy="190" r="18"/><text x="561" y="196" text-anchor="middle" class="callout">10</text>
    <text x="586" y="196" class="calloutText">Rows</text>
    <path class="arrow" d="M1500 710 C1360 660 1260 608 1184 546"/>
    <circle class="ring" cx="1527" cy="720" r="18"/><text x="1527" y="726" text-anchor="middle" class="callout">11</text>
    <text x="1553" y="726" class="calloutText">View canvas</text>
    <path class="arrow" d="M1750 113 C1770 101 1778 93 1785 84"/>
    <circle class="ring" cx="1724" cy="122" r="18"/><text x="1724" y="128" text-anchor="middle" class="callout">12</text>
    <text x="1515" y="128" class="calloutText">Show Me</text>
    <path class="arrow" d="M265 846 C225 866 190 877 154 883"/>
    <circle class="ring" cx="286" cy="833" r="18"/><text x="286" y="839" text-anchor="middle" class="callout">13</text>
    <text x="310" y="839" class="calloutText">Sheet tabs</text>
  </g>
</svg>
