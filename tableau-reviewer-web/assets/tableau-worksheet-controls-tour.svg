<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 356" role="img" aria-labelledby="title desc">
  <title id="title">Annotated Tableau worksheet controls</title>
  <desc id="desc">A cropped Tableau worksheet interface with numbered callouts for Data, Analytics, Pages, Filters, Marks, Color, Size, Text, Detail, Tooltip, Columns, Rows, and toolbar icons.</desc>
  <defs>
