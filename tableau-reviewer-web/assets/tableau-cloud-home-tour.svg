<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1890 960" role="img" aria-labelledby="title desc">
  <title id="title">Annotated Tableau Cloud home page</title>
  <desc id="desc">A Tableau Cloud home page diagram with numbered callouts pointing to navigation, search, recents, recommendations, new content menu, account tools, and content cards.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
    <style>
      .ui{font-family:Arial,Helvetica,sans-serif;fill:#17212b}
      .muted{fill:#697987}
      .tiny{font-size:13px}
      .small{font-size:16px}
      .mid{font-size:20px}
      .label{font-size:18px;font-weight:800;fill:#0f172a}
      .call{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:800;fill:#fff}
      .arrow{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .dot{fill:#2563eb;stroke:#fff;stroke-width:4}
      .card{fill:#fff;stroke:#d8e1e8}
      .thumb{fill:#f8fafc;stroke:#d8e1e8}
      .bar{fill:#4c78a8}
    </style>
  </defs>
